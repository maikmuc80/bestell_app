<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bestell App</title>
    <link rel="icon" href="./assets/icon/favicon.png" type="image/png">
    <link rel="stylesheet" href="style.css">
</head>
<body onload="init()">
    <header>
        <nav>
            <img class="logo" src="./assets/icon/logo.png" alt="">
            <img class="menu" src="./assets/icon/menu.png" alt="">
        </nav>
        <div class="header_picture">
            <img class="burger_hero_picture" src="./assets/img/hero-photo.jpg" alt="">
            <div class="header_burger">
                <img class="burger_header" src="./assets/img/burger-header.png" alt="">
            </div>   
        </div>
    </header>
    <div id="orderMessage" class="order_message">Thank you! This was a test order.</div>
    <main>
        <section class="headline">
            <div class="headline_item">
                <h1>BurgerHouse</h1>
                <p>The best of Burgers, Pizza, and Greens, all in one great place.</p>
            </div>
            <div class="rating">
            <div class="stars" aria-label="4.5 von 5 Sternen">
                <span class="star full">★</span>
                <span class="star full">★</span>
                <span class="star full">★</span>
                <span class="star full">★</span>
                <span class="star half">★</span>
            </div>
            <span class="rating_value">4.5</span>
            <span class="rating_count">(312 Bewertungen)</span>
        </div>
        <div class="delivery_info">
            <span>🚴 30–40 Min.</span>
            <span>📦 Lieferung 4,99€</span>
            <span>🛒 Mindestbestellwert 15€</span>
        </div>
        </section>
        <section class="products">
            <div id="category" class="category"></div>
            <aside class="aside_basket">
                <h2 class="basket_headline">Your Basket</h2>
                <div id="basket" class="basket" ></div>
            </aside>
        </section>
    </main>
    <footer>
        <div>&copy; 2025 BurgerHouse</div>
        <div>Imprint</div>
        <div>Cookie Preferences</div>
    </footer>
    <div class="mobile_bar">
        <img src="./assets/icon/Home.png" alt="">
        <img src="./assets/icon/Profile.png" alt="">
        <img src="./assets/icon/orders.png" alt="">
        <img onclick="mobileBarBasket()" src="./assets/icon/basket.png" alt="">
    </div>
    <dialog id="basketDialog">
        <div class="basket_dialog_inner">
            <div class="basket_dialog_header">
                <h2>Your Basket</h2>
                <button class="basket_dialog_close" onclick="closeBasketDialog()">✕</button>
            </div>
            <div id="basketDialogContent" class="basket"></div>
        </div>
    </dialog>
    <script src="./script/script.js"></script>
    <script src="./script/db.js"></script>
</html>
