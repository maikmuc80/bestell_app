<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bestell App</title>
    <link rel="stylesheet" href="style.css">
<body onload="init()">
    <header>
        <nav>
            <img class="logo" src="./assets/icon/logo.png" alt="">
            <img class="menu" src="./assets/icon/menu.png" alt="">
        </nav>
    </header>
    <main>
        <section class="headline">
            <div class="headline_item">
                <h1>BurgerHause</h1>
                <p>The best of Burgers, Pizza, and Greens, all in one great place.</p>
            </div>
        </section>
        <section class="products">
            <div id="category" class="category">
                <div class="category_heading">
                    <img src="./assets/icon/burger.png" alt="">
                    <h2>Überschrift Category</h2>
                </div>
                
                <article id="article" class="article">
                    <div>
                        <img class="article_picture" src="./assets/img/All_meat_burger.jpg" alt="">
                    </div>

                    <div class="article_description_price">
                        <div>
                            <h3>product name</h3>
                            <p>description</p>
                        </div>
                        <div class="price_basket">
                            <p>price</p>
                            <button>add to basket</button>
                        </div>
                    </div>
                </article>
            </div>
            <aside id="basket" class="basket">
                <h2>Basket</h2>
                <article class="article_basket" id="articleBasket">
                    <div class="article_basket_description">
                        <h3>produkt</h3>
                        <p>description</p>
                    </div>
                    <div class="article_basket_price">
                        <div> + 1 - </div>
                        <div>15,00 €</div>
                    </div>
                </article>
                <div class="basket_subtotal">
                    <p>Subtotal</p>
                    <p id="basketSubtotalPrice">15,00 €</p>
                </div>
                <div id="basketDelivery" class="basket_delivery">
                    <p>Delivery</p>
                    <p id="basketDeliveryPrice">2,00 €</p>
                </div>
                <div class="basket-row"></div>
                <div class="basket_total">
                    <p>Total</p>
                    <p id="basketTotalPrice">16,00 €</p>
                </div>
                <button id="basketButton" class="basket_button">
                    Buy now (15,00 €)
                </button>
            </aside>
        </section>
    </main>
    <footer></footer>
    <script src="./script.js"></script>
</html>
